body::before{
  content:'';position:fixed;inset:0;
  background:rgba(6,6,15,0.88);
  z-index:0;pointer-events:none;
}
.wrap{position:relative;z-index:1}

/* SYNC */
.sync-dot{width:8px;height:8px;border-radius:50%;background:#10B981;display:inline-block;margin-right:6px;box-shadow:0 0 8px #10B981}
.sync-dot.syncing{background:var(--gold);box-shadow:0 0 8px var(--gold);animation:pulse 0.8s infinite}
.sync-dot.error{background:#EF4444;box-shadow:0 0 8px #EF4444}
.sync-label{color:var(--muted);font-size:11px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* HEADER */
.site-header{
  background:rgba(6,6,15,0.7);backdrop-filter:var(--blur);
  padding:0 28px;display:flex;align-items:center;justify-content:space-between;
  height:72px;position:sticky;top:0;z-index:50;
  border-bottom:1px solid rgba(212,172,110,0.2);
}
.logo{display:flex;align-items:center;gap:14px}
.logo-img{height:46px;width:auto;filter:invert(1) brightness(1.8)}
.logo-text{color:#fff;font-size:16px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.logo-sub{color:var(--gold);font-size:10px;letter-spacing:2.5px;text-transform:uppercase;margin-top:2px}
.header-right{display:flex;align-items:center;gap:14px}
.sync-status{display:flex;align-items:center}
.date-chip{
  background:rgba(255,255,255,0.06);color:#D1D5DB;
  font-size:12px;padding:6px 14px;border-radius:20px;
  border:1px solid rgba(255,255,255,0.1);
}
.btn-reset{
  background:rgba(192,57,43,0.8);backdrop-filter:var(--blur);
  color:#fff;border:1px solid rgba(255,255,255,0.15);
  padding:10px 20px;border-radius:50px;font-size:13px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;gap:8px;
  transition:all 0.2s;letter-spacing:0.5px;
}
.btn-reset:hover{background:rgba(220,38,38,0.9);transform:translateY(-1px)}

/* SUMMARY */
.summary-bar{
  background:rgba(0,0,0,0.4);backdrop-filter:var(--blur);
  padding:12px 28px;display:flex;gap:10px;flex-wrap:wrap;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.s-pill{
  padding:6px 18px;border-radius:50px;font-size:12px;font-weight:700;
  border:1px solid transparent;backdrop-filter:var(--blur);letter-spacing:0.3px;
}
.s-libre{background:rgba(16,185,129,0.15);color:#6EE7B7;border-color:rgba(16,185,129,0.3)}
.s-ocup{background:rgba(220,38,38,0.15);color:#FCA5A5;border-color:rgba(220,38,38,0.3)}
.s-res{background:rgba(124,58,237,0.15);color:#C4B5FD;border-color:rgba(124,58,237,0.3)}
.s-limp{background:rgba(202,138,4,0.15);color:#FCD34D;border-color:rgba(202,138,4,0.3)}

/* MAIN */
.main{max-width:1000px;margin:0 auto;padding:24px 20px 60px}
.section-title{
  color:var(--gold);font-size:11px;font-weight:700;
  letter-spacing:3px;text-transform:uppercase;
  margin-bottom:16px;padding-left:4px;
  display:flex;align-items:center;gap:10px;
}
.section-title::after{content:'';flex:1;height:1px;background:rgba(212,172,110,0.2)}

/* ROOM CARD */
.room-card{
  backdrop-filter:var(--blur);
  border:1px solid var(--glass-border);
  border-radius:20px;margin-bottom:12px;overflow:hidden;
  background:var(--glass-bg);
  box-shadow:var(--glass-shadow);
  transition:all 0.3s ease;
}
.room-card.libre    {background:var(--libre-bg);border-color:var(--libre-bd);box-shadow:0 0 30px var(--libre-glow),var(--glass-shadow)}
.room-card.ocupada  {background:var(--ocup-bg);border-color:var(--ocup-bd);box-shadow:0 0 30px var(--ocup-glow),var(--glass-shadow)}
.room-card.limpieza {background:var(--limp-bg);border-color:var(--limp-bd);box-shadow:0 0 30px var(--limp-glow),var(--glass-shadow)}
.room-card.reservada{background:var(--res-bg);border-color:var(--res-bd);box-shadow:0 0 30px var(--res-glow),var(--glass-shadow)}

/* CARD TOP ROW */
.card-top{display:flex;align-items:center;gap:16px;padding:16px 20px 12px}
.room-badge{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-width:70px;
}
.num-big{font-size:32px;font-weight:800;line-height:1;letter-spacing:-1px}
.room-card.libre     .num-big{color:#6EE7B7}
.room-card.ocupada   .num-big{color:#FCA5A5}
.room-card.limpieza  .num-big{color:#FCD34D}
.room-card.reservada .num-big{color:#C4B5FD}
.tipo-badge{
  font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  padding:2px 8px;border-radius:20px;margin-top:4px;
  background:rgba(255,255,255,0.08);color:var(--muted);border:1px solid rgba(255,255,255,0.1);
}
.room-card.libre     .tipo-badge{background:rgba(16,185,129,0.15);color:#6EE7B7;border-color:rgba(16,185,129,0.3)}
.room-card.ocupada   .tipo-badge{background:rgba(220,38,38,0.15);color:#FCA5A5;border-color:rgba(220,38,38,0.3)}
.room-card.limpieza  .tipo-badge{background:rgba(202,138,4,0.15);color:#FCD34D;border-color:rgba(202,138,4,0.3)}
.room-card.reservada .tipo-badge{background:rgba(124,58,237,0.15);color:#C4B5FD;border-color:rgba(124,58,237,0.3)}

.card-info{flex:1}
.huesped-name{font-size:18px;font-weight:700;color:#fff;margin-bottom:2px}
.huesped-name.empty{color:var(--muted);font-style:italic;font-weight:400;font-size:14px}
.status-label{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.room-card.libre     .status-label{color:#6EE7B7}
.room-card.ocupada   .status-label{color:#FCA5A5}
.room-card.limpieza  .status-label{color:#FCD34D}
.room-card.reservada .status-label{color:#C4B5FD}

.card-actions{display:flex;gap:8px;align-items:center}
.btn-main{
  padding:12px 22px;border-radius:50px;font-size:13px;font-weight:700;
  cursor:pointer;border:1px solid transparent;transition:all 0.2s;
  letter-spacing:0.3px;white-space:nowrap;
}
.btn-ocupar{background:rgba(220,38,38,0.2);color:#FCA5A5;border-color:rgba(220,38,38,0.4)}
.btn-ocupar:hover{background:rgba(220,38,38,0.5);color:#fff;transform:translateY(-1px)}
.btn-liberar{background:rgba(202,138,4,0.2);color:#FCD34D;border-color:rgba(202,138,4,0.4)}
.btn-liberar:hover{background:rgba(202,138,4,0.5);color:#fff;transform:translateY(-1px)}
.btn-limpiar{background:rgba(16,185,129,0.2);color:#6EE7B7;border-color:rgba(16,185,129,0.4)}
.btn-limpiar:hover{background:rgba(16,185,129,0.5);color:#fff;transform:translateY(-1px)}
.btn-reserva-sm{
  padding:12px 16px;border-radius:50px;font-size:13px;font-weight:700;
  cursor:pointer;background:rgba(124,58,237,0.2);color:#C4B5FD;
  border:1px solid rgba(124,58,237,0.4);transition:all 0.2s;
}
.btn-reserva-sm:hover{background:rgba(124,58,237,0.5);color:#fff;transform:translateY(-1px)}

/* DIVIDER */
.card-divider{height:1px;background:rgba(255,255,255,0.07);margin:0 20px}

/* CARD BODY */
.card-body{padding:14px 20px;display:flex;flex-direction:column;gap:12px}

/* FIELDS */
.fields-grid{display:flex;gap:10px;flex-wrap:wrap}
.fld{display:flex;flex-direction:column;gap:4px}
.fld label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;font-weight:600}
.fld input,.fld select{
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
  border-radius:10px;padding:8px 12px;font-size:13px;color:#fff;
  font-family:inherit;transition:border-color 0.2s;
  -webkit-appearance:none;
}
.fld input::placeholder{color:rgba(255,255,255,0.25)}
.fld input:focus,.fld select:focus{outline:none;border-color:rgba(255,255,255,0.3);background:rgba(255,255,255,0.09)}
.fld input[type="date"],.fld input[type="time"]{color-scheme:dark}
.fld input.w-huesped{width:180px}
.fld input.w-tel{width:130px}
.fld input.w-date{width:130px}
.fld input.w-time{width:90px}
.fld select.w-med{width:130px}

/* PAGO SECTION */
.section-block{
  background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);
  border-radius:14px;padding:12px 14px;
}
.block-title{font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:10px}
.pago-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.metodo-btns{display:flex;gap:6px;flex-wrap:wrap}
.btn-metodo{
  padding:8px 14px;border-radius:50px;font-size:12px;font-weight:600;
  cursor:pointer;background:rgba(255,255,255,0.06);color:var(--muted);
  border:1px solid rgba(255,255,255,0.1);transition:all 0.2s;
}
.btn-metodo.active{background:rgba(212,172,110,0.2);color:var(--gold);border-color:rgba(212,172,110,0.5)}
.btn-metodo:hover{background:rgba(255,255,255,0.1);color:#fff}
.estado-btns{display:flex;gap:6px}
.btn-estado{
  padding:8px 14px;border-radius:50px;font-size:12px;font-weight:600;
  cursor:pointer;background:rgba(255,255,255,0.06);color:var(--muted);
  border:1px solid rgba(255,255,255,0.1);transition:all 0.2s;
}
.btn-estado.active-completo{background:rgba(16,185,129,0.2);color:#6EE7B7;border-color:rgba(16,185,129,0.4)}
.btn-estado.active-adelanto{background:rgba(202,138,4,0.2);color:#FCD34D;border-color:rgba(202,138,4,0.4)}
.btn-estado.active-pendiente{background:rgba(220,38,38,0.2);color:#FCA5A5;border-color:rgba(220,38,38,0.4)}

/* EXTRAS */
.extras-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
.btn-extra{
  padding:8px 16px;border-radius:50px;font-size:13px;font-weight:600;
  cursor:pointer;background:rgba(255,255,255,0.06);color:#fff;
  border:1px solid rgba(255,255,255,0.1);transition:all 0.2s;display:flex;align-items:center;gap:6px;
}
.btn-extra:hover{background:rgba(255,255,255,0.12);transform:translateY(-1px)}
.extras-list{display:flex;flex-direction:column;gap:6px}
.extra-item{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,0.04);border-radius:10px;padding:8px 12px;
}
.extra-item span{flex:1;font-size:13px;color:#fff}
.extra-price{
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
  border-radius:8px;padding:5px 10px;font-size:13px;color:#fff;
  width:90px;font-family:inherit;text-align:right;
}
.extra-price:focus{outline:none;border-color:rgba(255,255,255,0.3)}
.btn-del-extra{
  background:rgba(220,38,38,0.15);color:#FCA5A5;border:1px solid rgba(220,38,38,0.3);
  border-radius:8px;padding:5px 10px;font-size:12px;cursor:pointer;transition:all 0.2s;font-weight:700;
}
.btn-del-extra:hover{background:rgba(220,38,38,0.4);color:#fff}

/* TOTAL BOX */
.total-box{
  background:rgba(212,172,110,0.08);border:1px solid rgba(212,172,110,0.25);
  border-radius:14px;padding:12px 16px;
  display:flex;justify-content:space-between;align-items:center;
}
.total-breakdown{display:flex;flex-direction:column;gap:3px}
.total-line{font-size:12px;color:var(--muted);display:flex;justify-content:space-between;gap:24px}
.total-line.main-total{font-size:15px;font-weight:700;color:var(--gold);margin-top:4px;border-top:1px solid rgba(212,172,110,0.2);padding-top:6px}

/* NOTES */
.notes-input{
  width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
  border-radius:10px;padding:8px 12px;font-size:13px;color:#fff;
  font-family:inherit;
}
.notes-input::placeholder{color:rgba(255,255,255,0.2)}
.notes-input:focus{outline:none;border-color:rgba(255,255,255,0.25)}

/* RESERVA TAG */
.reserva-tag{
  display:inline-flex;align-items:center;gap:6px;
  font-size:12px;background:rgba(124,58,237,0.15);color:#C4B5FD;
  border-radius:50px;padding:4px 12px;border:1px solid rgba(124,58,237,0.3);font-weight:600;
}
.btn-cancel-res{
  font-size:11px;background:rgba(220,38,38,0.15);color:#FCA5A5;
  border:1px solid rgba(220,38,38,0.3);border-radius:50px;
  padding:4px 12px;cursor:pointer;font-weight:700;font-family:inherit;transition:all 0.2s;
}
.btn-cancel-res:hover{background:rgba(220,38,38,0.4);color:#fff}

/* MODALS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(6px)}
.overlay.open{display:flex}
.modal{
  background:rgba(15,15,25,0.95);backdrop-filter:var(--blur);
  border-radius:20px;padding:28px;width:400px;max-width:95vw;
  box-shadow:0 24px 60px rgba(0,0,0,0.6);
  border:1px solid rgba(255,255,255,0.1);
}
.modal h3{font-size:18px;font-weight:800;margin-bottom:18px;color:#fff}
.mfld{margin-bottom:14px}
.mfld label{font-size:10px;color:var(--muted);display:block;margin-bottom:5px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px}
.mfld input{
  width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);
  border-radius:10px;padding:10px 14px;font-size:14px;color:#fff;font-family:inherit;
}
.mfld input:focus{outline:none;border-color:rgba(255,255,255,0.3)}
.mfld input::placeholder{color:rgba(255,255,255,0.25)}
.mfld-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-btns{display:flex;gap:10px;margin-top:20px}
.modal-btns button{
  flex:1;padding:12px;border-radius:50px;font-size:14px;
  font-weight:700;cursor:pointer;border:1px solid transparent;
  transition:all 0.2s;font-family:inherit;letter-spacing:0.3px;
}
.btn-cancel-m{background:rgba(255,255,255,0.06);color:var(--muted);border-color:rgba(255,255,255,0.1)}
.btn-cancel-m:hover{background:rgba(255,255,255,0.1);color:#fff}
.btn-save-m{background:rgba(212,172,110,0.2);color:var(--gold);border-color:rgba(212,172,110,0.4)}
.btn-save-m:hover{background:rgba(212,172,110,0.4);color:#fff}
.btn-danger-m{background:rgba(220,38,38,0.2);color:#FCA5A5;border-color:rgba(220,38,38,0.4)}
.btn-danger-m:hover{background:rgba(220,38,38,0.5);color:#fff}

/* TOAST */
.toast{
  position:fixed;bottom:24px;right:24px;
  background:rgba(15,15,25,0.95);backdrop-filter:var(--blur);color:#fff;
  padding:14px 20px;border-radius:14px;font-size:13px;
  display:none;z-index:300;
  box-shadow:0 8px 30px rgba(0,0,0,0.5);
  border:1px solid rgba(212,172,110,0.3);font-weight:600;
  border-left:4px solid var(--gold);
}

@media(max-width:680px){
  .card-top{flex-wrap:wrap}
  .card-actions{flex-wrap:wrap}
  .site-header{padding:0 14px;height:60px}
  .logo-img{height:36px}
  .main{padding:16px 12px 40px}
}
</style>

<script>
const FB   = 'https://hostal-new-york-c10fb-default-rtdb.firebaseio.com';
const IDS  = ['101','102','103','201','202','203','301','302','303'];
const TIPOS = {"101": "Matrimonial", "102": "Matrimonial", "103": "Individual", "201": "Individual", "202": "Matrimonial", "203": "Individual", "301": "Individual", "302": "Matrimonial", "303": "Individual"};
const EXTRAS_RAPIDOS = [
  {emoji:'💧', nombre:'Agua'},
  {emoji:'🍫', nombre:'Dulces'},
  {emoji:'🍳', nombre:'Desayuno'},
];

let state = {};
let modalTarget = null;
let lastHash = '';

function defRoom(id) {
  return {
    id, status:'libre',
    huesped:'', tel:'', f_entrada:'', h_entrada:'', f_salida:'', h_salida:'',
    notas:'', pago_monto:'', pago_metodo:'', pago_estado:'',
    res_nombre:'', res_tel:'', res_fe:'', res_he:'14:00', res_fs:'', res_hs:'11:00', res_notas:'',
    extras:[]
  };
}

async function fbGet(p)    { try{const r=await fetch(FB+p+'.json');return r.ok?r.json():null;}catch(e){return null;} }
async function fbSet(p,d)  { try{setSync('syncing');const r=await fetch(FB+p+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});setSync(r.ok?'ok':'error');}catch(e){setSync('error');} }
async function fbPatch(p,d){ try{setSync('syncing');const r=await fetch(FB+p+'.json',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});setSync(r.ok?'ok':'error');}catch(e){setSync('error');} }

function setSync(s){
  document.getElementById('sync-dot').className='sync-dot'+(s==='ok'?'':' '+s);
  document.getElementById('sync-label').textContent=s==='ok'?'En línea':s==='syncing'?'Guardando...':'Sin conexión';
}

async function init(){
  const data=await fbGet('/rooms');
  if(data){IDS.forEach(id=>{state[id]=Object.assign(defRoom(id),data[id]||{});if(!state[id].extras)state[id].extras=[];});}
  else{IDS.forEach(id=>{state[id]=defRoom(id);});await fbSet('/rooms',state);}
  setSync('ok');render();
  setInterval(async()=>{
    const data=await fbGet('/rooms');if(!data)return;
    const h=JSON.stringify(data);
    if(h!==lastHash){lastHash=h;IDS.forEach(id=>{state[id]=Object.assign(defRoom(id),data[id]||{});if(!state[id].extras)state[id].extras=[];});render();}
  },3000);
}

async function saveRoom(id){
  await fbPatch('/rooms',{[id]:state[id]});
  lastHash='';
}

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.style.display='block';
  clearTimeout(el._t);el._t=setTimeout(()=>el.style.display='none',2800);
}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function showReset(){document.getElementById('reset-modal').classList.add('open');}

async function doReset(){
  IDS.forEach(id=>{
    const r=state[id];
    if(r.status==='ocupada'||r.status==='limpieza') r.status='limpieza';
    else if(r.status!=='reservada') r.status='libre';
    r.huesped='';r.tel='';r.f_entrada='';r.h_entrada='';
    r.f_salida='';r.h_salida='';r.notas='';
    r.pago_monto='';r.pago_metodo='';r.pago_estado='';
    r.extras=[];
  });
  await fbSet('/rooms',state);lastHash='';
  closeModal('reset-modal');render();
  toast('✓ Nuevo día — habitaciones ocupadas pasan a limpieza');
}

async function toggleStatus(id){
  const r=state[id];
  if(r.status==='libre'||r.status==='reservada'){
    r.status='ocupada';
    if(!r.h_entrada)r.h_entrada=new Date().toTimeString().slice(0,5);
    if(!r.f_entrada)r.f_entrada=new Date().toISOString().slice(0,10);
  } else if(r.status==='ocupada'){
    r.status='limpieza';
  } else if(r.status==='limpieza'){
    r.status='libre';
    r.huesped='';r.tel='';r.f_entrada='';r.h_entrada='';
    r.f_salida='';r.h_salida='';r.notas='';
    r.pago_monto='';r.pago_metodo='';r.pago_estado='';r.extras=[];
  }
  render();await saveRoom(id);
}

async function setField(id,field,val){
  state[id][field]=val;
  if(field==='pago_monto') updateTotalBox(id);
  updateSummary();await saveRoom(id);
}

async function setMetodo(id,val){
  state[id].pago_metodo=val;render();await saveRoom(id);
}
async function setEstado(id,val){
  state[id].pago_estado=val;render();await saveRoom(id);
}

async function addExtra(id,nombre){
  state[id].extras.push({nombre,monto:''});
  render();await saveRoom(id);
}
async function addExtraCustom(id){
  const n=prompt('¿Qué servicio o producto?');
  if(n&&n.trim()){state[id].extras.push({nombre:n.trim(),monto:''});render();await saveRoom(id);}
}
async function updateExtraMonto(id,idx,val){
  state[id].extras[idx].monto=val;
  updateTotalBox(id);
  updateSummary();
  await saveRoom(id);
}

function updateTotalBox(id){
  const r=state[id];
  const {pago,extras,total}=calcTotal(r);
  const box=document.getElementById('total-box-'+id);
  if(!box) return;
  const showTotal=(r.pago_monto||r.extras.length>0);
  if(!showTotal){box.style.display='none';return;}
  box.style.display='flex';
  box.innerHTML=`
    <div class="total-breakdown" style="width:100%">
      <div class="total-line"><span>Pago habitación</span><span>${fmtSoles(r.pago_monto)}</span></div>
      <div class="total-line"><span>Extras</span><span>${fmtSoles(extras)}</span></div>
      <div class="total-line main-total"><span>TOTAL</span><span>${fmtSoles(total)}</span></div>
    </div>`;
}
async function removeExtra(id,idx){
  state[id].extras.splice(idx,1);render();await saveRoom(id);
}

function openReservaModal(id){
  modalTarget=id;const r=state[id];
  document.getElementById('res-title').textContent='Reserva — Hab. '+id;
  document.getElementById('m-nombre').value=r.res_nombre||'';
  document.getElementById('m-tel').value=r.res_tel||'';
  document.getElementById('m-fe').value=r.res_fe||'';
  document.getElementById('m-he').value=r.res_he||'14:00';
  document.getElementById('m-fs').value=r.res_fs||'';
  document.getElementById('m-hs').value=r.res_hs||'11:00';
  document.getElementById('m-notas').value=r.res_notas||'';
  document.getElementById('res-modal').classList.add('open');
}
async function saveReserva(){
  if(!modalTarget)return;const r=state[modalTarget];
  r.res_nombre=document.getElementById('m-nombre').value;
  r.res_tel=document.getElementById('m-tel').value;
  r.res_fe=document.getElementById('m-fe').value;
  r.res_he=document.getElementById('m-he').value;
  r.res_fs=document.getElementById('m-fs').value;
  r.res_hs=document.getElementById('m-hs').value;
  r.res_notas=document.getElementById('m-notas').value;
  if(r.status!=='ocupada')r.status='reservada';
  closeModal('res-modal');render();await saveRoom(modalTarget);
  toast('✓ Reserva guardada — Hab. '+modalTarget);
}
async function clearReserva(id){
  const r=state[id];
  r.res_nombre='';r.res_tel='';r.res_fe='';r.res_he='';r.res_fs='';r.res_hs='';r.res_notas='';
  if(r.status==='reservada')r.status='libre';
  render();await saveRoom(id);toast('Reserva cancelada — Hab. '+id);
}

function fmtDate(d){if(!d)return '';const p=d.split('-');return p.length===3?p[2]+'/'+p[1]:d;}
function fmtSoles(v){const n=parseFloat(v);return isNaN(n)?'—':'S/. '+n.toFixed(2);}

function calcTotal(r){
  const pago=parseFloat(r.pago_monto)||0;
  const extras=(r.extras||[]).reduce((s,e)=>s+(parseFloat(e.monto)||0),0);
  return {pago,extras,total:pago+extras};
}

function updateSummary(){
  let libre=0,ocup=0,limp=0,res=0;
  IDS.forEach(id=>{
    const s=state[id].status;
    if(s==='libre')libre++;else if(s==='ocupada')ocup++;
    else if(s==='limpieza')limp++;else if(s==='reservada')res++;
  });
  document.getElementById('sum-libre').textContent=libre+(libre===1?' libre':' libres');
  document.getElementById('sum-ocup').textContent=ocup+(ocup===1?' ocupada':' ocupadas');
  document.getElementById('sum-limp').textContent=limp+(limp===1?' en limpieza':' en limpieza');
  document.getElementById('sum-res').textContent=res+(res===1?' reservada':' reservadas');
}

function btnMainHTML(id,status){
  if(status==='libre'||status==='reservada')
    return `<button class="btn-main btn-ocupar" onclick="toggleStatus('${id}')">🔴 Ocupar</button>`;
  if(status==='ocupada')
    return `<button class="btn-main btn-liberar" onclick="toggleStatus('${id}')">🟡 Desocupar</button>`;
  if(status==='limpieza')
    return `<button class="btn-main btn-limpiar" onclick="toggleStatus('${id}')">✅ Lista</button>`;
  return '';
}

function render(){
  updateSummary();
  const container=document.getElementById('rooms-container');
  container.innerHTML='';
  IDS.forEach(id=>{
    const r=state[id];
    const tipo=TIPOS[id]||'';
    const tipoIcon=tipo==='Matrimonial'?'👫':'🧍';
    const statusLabel=r.status==='libre'?'LIBRE':r.status==='ocupada'?'OCUPADA':r.status==='limpieza'?'LIMPIEZA':'RESERVADA';
    const {pago,extras,total}=calcTotal(r);

    // extras HTML
    let extrasHTML='';
    (r.extras||[]).forEach((e,i)=>{
      extrasHTML+=`<div class="extra-item">
        <span>${e.nombre}</span>
        <input class="extra-price" type="number" placeholder="S/. 0" value="${e.monto}"
          oninput="updateExtraMonto('${id}',${i},this.value)" />
        <button class="btn-del-extra" onclick="removeExtra('${id}',${i})">✕</button>
      </div>`;
    });

    // reserva tag
    const resTag=(r.res_nombre||r.res_fe)?
      `<span class="reserva-tag">📅 ${fmtDate(r.res_fe)}${r.res_nombre?' · '+r.res_nombre:''}</span>
       <button class="btn-cancel-res" onclick="clearReserva('${id}')">✕ Cancelar</button>`:'';

    // metodo btns
    const metodos=['Efectivo','Yape','Depósito','Plin'];
    const metodoHTML=metodos.map(m=>
      `<button class="btn-metodo${r.pago_metodo===m?' active':''}" onclick="setMetodo('${id}','${m}')">${m}</button>`
    ).join('');

    // estado btns
    const estados=[['Completo','completo'],['Adelanto','adelanto'],['Pendiente','pendiente']];
    const estadoHTML=estados.map(([label,val])=>
      `<button class="btn-estado${r.pago_estado===val?' active-'+val:''}" onclick="setEstado('${id}','${val}')">${label}</button>`
    ).join('');

    // total box — only show if there's something
    const showTotal=(r.pago_monto||r.extras.length>0);
    const totalHTML=`
      <div class="total-box" id="total-box-${id}" style="${showTotal?'':'display:none'}">
        <div class="total-breakdown" style="width:100%">
          <div class="total-line"><span>Pago habitación</span><span>${fmtSoles(r.pago_monto)}</span></div>
          <div class="total-line"><span>Extras</span><span>${fmtSoles(extras)}</span></div>
          <div class="total-line main-total"><span>TOTAL</span><span>${fmtSoles(total)}</span></div>
        </div>
      </div>`;

    const card=document.createElement('div');
    card.className='room-card '+r.status;
    card.innerHTML=`
      <div class="card-top">
        <div class="room-badge">
          <span class="num-big">${id}</span>
          <span class="tipo-badge">${tipoIcon} ${tipo}</span>
        </div>
        <div class="card-info">
          <div class="huesped-name${r.huesped?'':' empty'}">${r.huesped||'Sin huésped'}</div>
          <div class="status-label">${statusLabel}</div>
          ${resTag}
        </div>
        <div class="card-actions">
          ${btnMainHTML(id,r.status)}
          <button class="btn-reserva-sm" onclick="openReservaModal('${id}')">📅 Reserva</button>
        </div>
      </div>
      <div class="card-divider"></div>
      <div class="card-body">
        <div class="fields-grid">
          <div class="fld"><label>Huésped</label>
            <input class="w-huesped" placeholder="Nombre completo" value="${r.huesped}"
              oninput="setField('${id}','huesped',this.value)"/></div>
          <div class="fld"><label>Teléfono</label>
            <input class="w-tel" placeholder="+51 999..." value="${r.tel}"
              oninput="setField('${id}','tel',this.value)"/></div>
          <div class="fld"><label>F. entrada</label>
            <input type="date" class="w-date" value="${r.f_entrada}"
              onchange="setField('${id}','f_entrada',this.value)"/></div>
          <div class="fld"><label>Hr entrada</label>
            <input type="time" class="w-time" value="${r.h_entrada}"
              onchange="setField('${id}','h_entrada',this.value)"/></div>
          <div class="fld"><label>F. salida</label>
            <input type="date" class="w-date" value="${r.f_salida}"
              onchange="setField('${id}','f_salida',this.value)"/></div>
          <div class="fld"><label>Hr salida</label>
            <input type="time" class="w-time" value="${r.h_salida}"
              onchange="setField('${id}','h_salida',this.value)"/></div>
        </div>

        <!-- PAGO -->
        <div class="section-block">
          <div class="block-title">💰 Pago</div>
          <div class="pago-row">
            <div class="fld"><label>Monto (S/.)</label>
              <input type="number" style="width:110px" placeholder="0.00" value="${r.pago_monto}"
                oninput="setField('${id}','pago_monto',this.value)"/></div>
            <div class="fld"><label>Método</label>
              <div class="metodo-btns">${metodoHTML}</div></div>
            <div class="fld"><label>Estado</label>
              <div class="estado-btns">${estadoHTML}</div></div>
          </div>
        </div>

        <!-- EXTRAS -->
        <div class="section-block">
          <div class="block-title">🛎️ Servicios extras</div>
          <div class="extras-row">
            ${EXTRAS_RAPIDOS.map(e=>`<button class="btn-extra" onclick="addExtra('${id}','${e.emoji} ${e.nombre}')">${e.emoji} ${e.nombre}</button>`).join('')}
            <button class="btn-extra" onclick="addExtraCustom('${id}')">➕ Otro</button>
          </div>
          ${extrasHTML?`<div class="extras-list">${extrasHTML}</div>`:''}
        </div>

        ${totalHTML}

        <input class="notes-input" placeholder="📝 Notas / observaciones..." value="${r.notas}"
          oninput="setField('${id}','notas',this.value)"/>
      </div>`;
    container.appendChild(card);
  });
}

document.getElementById('date-chip').textContent=
  new Date().toLocaleDateString('es-ES',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});

init();
</script>
</body>
</html>
